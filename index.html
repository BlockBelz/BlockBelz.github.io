<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qubo's Drop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Qubo's Drop</h1>

    <p>
        Dodge obstacles, collect rewards and set new records!
    </p>

    <div class="card">
        <h2>Contact</h2>
        <p>Email: qubos.drop.game@gmail.com</p>
    </div>

    <div class="card">
        <h2>Privacy & Ads</h2>
        <p>
            App advertising authorization file:
            <br>
            <a href="app-ads.txt">app-ads.txt</a>
        </p>
    </div>

    <div class="footer">
        © 2026 Qubo's Drop
    </div>
</div>

</body>
</html>
